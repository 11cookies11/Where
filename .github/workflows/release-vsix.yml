name: Release VSIX

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: where-progress-vsix
          path: "*.vsix"
